name: Deploy Frontend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      working-directory: ./Liftsync-frontend
      run: npm ci

    - name: Extract and compile translations
      working-directory: ./Liftsync-frontend
      run: |
        npm run translations:extract
        npm run translations:compile

    - name: Verify compiled translations exist
      working-directory: ./Liftsync-frontend
      run: |
        echo "Checking compiled translations..."
        ls -la src/translations/locales/*/messages.mjs || echo "Warning: No .mjs files found!"

    - name: Build frontend
      working-directory: ./Liftsync-frontend
      run: npm run build

    - name: Clean old frontend
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          rm -rf /var/www/liftsync/frontend/*

    - name: Upload new frontend build
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "Liftsync-frontend/dist/*"
        target: "/var/www/liftsync/frontend"
        strip_components: 2